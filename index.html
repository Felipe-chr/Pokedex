<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pokédex - Felipe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <img class="logo" src="assets/logo.png" alt="logo">
        <div class="pokedex">
            <div class="visor" id="visorId"></div>
            <div class="d-pad">
                <button class="direcional cima"></button>
                <button class="direcional esquerda"></button>
                <div class="centro-pad"></div>
                <button class="direcional direita"></button>
                <button class="direcional baixo"></button>
            </div>
            <input class="input" id="inputId" type="text" placeholder="Filtrar busca: (Name, id)">
            <button id="buttonId" class="button2">Carregar Pokémon</button>
            <div class="meuNome">Felipe da Silveira Christofis</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
